<!DOCTYPE html>

<body>
<form method="post" class="container" action="table.php">

    <div class="field">

        <label class="option">
            <input type="radio" name="q1" value="1"> &lt;link&gt;

        <label class="option">
            <input type="radio" name="q1" value="2"> &lt;a&gt;

        <label class="option">

        <label class="option">

        <label class="option">
            <input type="radio" name="q3" value="1"> &lt;ul&gt;

        </label>

        </label>
